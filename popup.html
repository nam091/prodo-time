<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=420, initial-scale=1.0">
  <title>ProdoTime</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="url(#grad1)" stroke-width="2.5"/>
            <line x1="12" y1="6" x2="12" y2="12" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="12" y1="12" x2="16" y2="14" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#818cf8"/>
                <stop offset="100%" stop-color="#c084fc"/>
              </linearGradient>
              <linearGradient id="grad2" x1="0" y1="0" x2="24" y2="24">
                <stop offset="0%" stop-color="#c084fc"/>
                <stop offset="100%" stop-color="#f472b6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">ProdoTime</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btnTheme" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="stopwatch">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3L2 6"/><path d="M22 6l-3-3"/><line x1="12" y1="1" x2="12" y2="3"/>
        </svg>
        <span>Stopwatch</span>
      </button>
      <button class="tab" data-tab="countdown">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 2h4"/><path d="M12 14V10"/><circle cx="12" cy="14" r="8"/>
        </svg>
        <span>Countdown</span>
      </button>
      <button class="tab" data-tab="sps">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <span>SPS Calc</span>
      </button>
      <button class="tab" data-tab="pomodoro">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/>
        </svg>
        <span>Pomodoro</span>
      </button>
      <button class="tab" data-tab="history">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/>
        </svg>
        <span>History</span>
      </button>
    </nav>

    <!-- Content Panels -->
    <main class="content">

      <!-- ===== STOPWATCH ===== -->
      <section class="panel active" id="panelStopwatch">
        <div class="timer-display">
          <div class="timer-ring">
            <svg viewBox="0 0 200 200" class="ring-svg">
              <circle cx="100" cy="100" r="90" class="ring-bg"/>
              <circle cx="100" cy="100" r="90" class="ring-progress" id="swRing"/>
            </svg>
            <div class="timer-value">
              <span class="time-main" id="swTime">00:00</span>
              <span class="time-ms" id="swMs">.00</span>
            </div>
          </div>
        </div>
        <div class="controls">
          <button class="btn btn-secondary" id="swReset" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset
          </button>
          <button class="btn btn-primary" id="swStart">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start
          </button>
          <button class="btn btn-secondary" id="swLap" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
            Lap
          </button>
        </div>
        <div class="laps-container" id="lapsContainer">
          <div class="laps-header" id="lapsHeader" style="display:none">
            <span>Lap</span><span>Time</span><span>Total</span>
          </div>
          <div class="laps-list" id="lapsList"></div>
        </div>
      </section>

      <!-- ===== COUNTDOWN ===== -->
      <section class="panel" id="panelCountdown">
        <div class="countdown-setup" id="cdSetup">
          <div class="cd-presets">
            <button class="preset-btn" data-seconds="30">30s</button>
            <button class="preset-btn" data-seconds="60">1m</button>
            <button class="preset-btn" data-seconds="180">3m</button>
            <button class="preset-btn" data-seconds="300">5m</button>
            <button class="preset-btn" data-seconds="600">10m</button>
            <button class="preset-btn" data-seconds="900">15m</button>
          </div>
          <div class="cd-custom">
            <label>Custom time</label>
            <div class="cd-inputs">
              <div class="cd-input-group">
                <input type="number" id="cdHours" value="0" min="0" max="23">
                <span>h</span>
              </div>
              <div class="cd-input-group">
                <input type="number" id="cdMinutes" value="5" min="0" max="59">
                <span>m</span>
              </div>
              <div class="cd-input-group">
                <input type="number" id="cdSeconds" value="0" min="0" max="59">
                <span>s</span>
              </div>
            </div>
          </div>
        </div>
        <div class="timer-display" id="cdDisplay" style="display:none">
          <div class="timer-ring countdown-ring">
            <svg viewBox="0 0 200 200" class="ring-svg">
              <circle cx="100" cy="100" r="90" class="ring-bg"/>
              <circle cx="100" cy="100" r="90" class="ring-progress ring-countdown" id="cdRing"/>
            </svg>
            <div class="timer-value">
              <span class="time-main" id="cdTime">05:00</span>
              <span class="time-label" id="cdLabel">remaining</span>
            </div>
          </div>
        </div>
        <div class="controls">
          <button class="btn btn-secondary" id="cdReset" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset
          </button>
          <button class="btn btn-primary" id="cdStart">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start
          </button>
        </div>
      </section>

      <!-- ===== SPS CALCULATOR ===== -->
      <section class="panel" id="panelSps">
        <div class="sps-card">
          <div class="sps-mode-toggle">
            <button class="sps-mode active" data-mode="manual" id="spsModeManual">Manual</button>
            <button class="sps-mode" data-mode="timer" id="spsModeTimer">With Timer</button>
          </div>

          <!-- Manual Mode -->
          <div class="sps-manual" id="spsManual">
            <div class="sps-input-group">
              <label for="spsSentences">Number of sentences</label>
              <input type="number" id="spsSentences" value="" placeholder="e.g. 15" min="0">
            </div>
            <div class="sps-input-group">
              <label for="spsSeconds">Time (seconds)</label>
              <input type="number" id="spsSeconds" value="" placeholder="e.g. 60" min="0" step="0.1">
            </div>
            <button class="btn btn-primary btn-full" id="spsCalcBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              Calculate SPS
            </button>
          </div>

          <!-- Timer Mode -->
          <div class="sps-timer" id="spsTimer" style="display:none">
            <div class="sps-input-group">
              <label for="spsSentencesTimer">Number of sentences</label>
              <input type="number" id="spsSentencesTimer" value="" placeholder="Enter after timing" min="0">
            </div>
            <div class="sps-timer-display">
              <span class="sps-timer-value" id="spsTimerValue">00:00.0</span>
            </div>
            <div class="controls">
              <button class="btn btn-secondary" id="spsTimerReset" disabled>Reset</button>
              <button class="btn btn-primary" id="spsTimerStart">Start Timer</button>
            </div>
            <button class="btn btn-accent btn-full" id="spsTimerCalc" disabled style="margin-top:12px">
              Calculate SPS
            </button>
          </div>

          <!-- Result -->
          <div class="sps-result" id="spsResult" style="display:none">
            <div class="sps-result-card">
              <div class="sps-result-value" id="spsResultValue">0.00</div>
              <div class="sps-result-label">sentences / second</div>
              <div class="sps-result-detail" id="spsResultDetail"></div>
            </div>
            <button class="btn btn-secondary btn-full" id="spsSaveBtn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              Save to History
            </button>
          </div>
        </div>
      </section>

      <!-- ===== POMODORO ===== -->
      <section class="panel" id="panelPomodoro">
        <div class="pomo-status">
          <div class="pomo-dots" id="pomoDots">
            <span class="pomo-dot active"></span>
            <span class="pomo-dot"></span>
            <span class="pomo-dot"></span>
            <span class="pomo-dot"></span>
          </div>
          <span class="pomo-session-label" id="pomoSessionLabel">Focus Session 1/4</span>
        </div>
        <div class="timer-display">
          <div class="timer-ring pomo-ring">
            <svg viewBox="0 0 200 200" class="ring-svg">
              <circle cx="100" cy="100" r="90" class="ring-bg"/>
              <circle cx="100" cy="100" r="90" class="ring-progress ring-pomo" id="pomoRing"/>
            </svg>
            <div class="timer-value">
              <span class="time-main" id="pomoTime">25:00</span>
              <span class="time-label" id="pomoLabel">FOCUS</span>
            </div>
          </div>
        </div>
        <div class="controls">
          <button class="btn btn-secondary" id="pomoReset">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Reset
          </button>
          <button class="btn btn-primary" id="pomoStart">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Start
          </button>
          <button class="btn btn-secondary" id="pomoSkip">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
            Skip
          </button>
        </div>
        <div class="pomo-settings">
          <details class="pomo-details">
            <summary>⚙️ Settings</summary>
            <div class="pomo-settings-grid">
              <div class="setting-item">
                <label>Focus (min)</label>
                <input type="number" id="pomoFocus" value="25" min="1" max="90">
              </div>
              <div class="setting-item">
                <label>Short Break (min)</label>
                <input type="number" id="pomoShort" value="5" min="1" max="30">
              </div>
              <div class="setting-item">
                <label>Long Break (min)</label>
                <input type="number" id="pomoLong" value="15" min="1" max="60">
              </div>
              <div class="setting-item">
                <label>Sessions</label>
                <input type="number" id="pomoSessions" value="4" min="1" max="10">
              </div>
            </div>
          </details>
        </div>
      </section>

      <!-- ===== HISTORY ===== -->
      <section class="panel" id="panelHistory">
        <div class="history-header">
          <h3>Session History</h3>
          <button class="btn btn-danger btn-sm" id="clearHistory">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Clear All
          </button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
              <path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/>
            </svg>
            <p>No sessions recorded yet</p>
            <span>Use the timer or calculator to create entries</span>
          </div>
        </div>
      </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>ProdoTime v1.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
